name: Build Web to APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          rm -rf www capacitor.config.json android
          mkdir www
          cp -r index.html www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true
          cp -r css www/ 2>/dev/null || true
          cp -r js www/ 2>/dev/null || true
          npx cap init "My App" "com.example.myapp" --web-dir www
          npx cap add android
          npx cap sync android

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
