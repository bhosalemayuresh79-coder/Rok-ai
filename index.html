<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rok-ai App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-dark text-white">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <h1 class="display-5 text-info mb-4">Rok-ai App</h1>
                
                <div class="card bg-secondary shadow-lg p-4 text-white mb-4">
                    <h5 class="mb-3 text-warning">Add New Task</h5>
                    <div class="input-group mb-3">
                        <input type="text" id="taskInput" class="form-control" placeholder="Kahi tari type kar...">
                        <button class="btn btn-info fw-bold" onclick="addTask()">Save</button>
                    </div>
                    <div id="status" class="alert alert-info py-2 small">Connecting to Supabase...</div>
                    <button class="btn btn-outline-light btn-sm w-100" onclick="checkData()">Refresh Connection</button>
                </div>
                
                <div class="text-start">
                    <h5 class="text-info">Saved Data:</h5>
                    <ul id="taskList" class="list-group">
                        </ul>
                </div>

                <div id="output" class="mt-4"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
